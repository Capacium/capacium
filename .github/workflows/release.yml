name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════
  # Stage 1: Build & Test
  # ═══════════════════════════════════════════
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        shell: bash  # Windows defaults to pwsh, which cannot parse \ line continuations

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml cryptography pytest pytest-cov ruff build
          pip install git+https://github.com/Capacium/capacium-models.git
          pip install -e .

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_signing.py \
            --ignore=tests/test_integration_phase0.py

      - name: Build package
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/

  # ═══════════════════════════════════════════
  # Stage 1b: Build standalone binaries
  # ═══════════════════════════════════════════
  build-binaries:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .[signing,yaml]

      - name: Build with PyInstaller
        run: |
          pyinstaller --name cap --onefile src/capacium/cli.py

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv dist/cap dist/cap-${{ runner.os }}-${{ runner.arch }}
          tar -czvf cap-${{ runner.os }}-${{ runner.arch }}.tar.gz -C dist cap-${{ runner.os }}-${{ runner.arch }}
          shasum -a 256 cap-${{ runner.os }}-${{ runner.arch }}.tar.gz > cap-${{ runner.os }}-${{ runner.arch }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Rename-Item -Path "dist\cap.exe" -NewName "cap-${{ runner.os }}-${{ runner.arch }}.exe"
          Compress-Archive -Path "dist\cap-${{ runner.os }}-${{ runner.arch }}.exe" -DestinationPath "cap-${{ runner.os }}-${{ runner.arch }}.zip"
          Get-FileHash -Algorithm SHA256 "cap-${{ runner.os }}-${{ runner.arch }}.zip" | Select-Object -ExpandProperty Hash | Out-File -FilePath "cap-${{ runner.os }}-${{ runner.arch }}.zip.sha256" -Encoding ASCII

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            cap-*.tar.gz
            cap-*.tar.gz.sha256
            cap-*.zip
            cap-*.zip.sha256

  # ═══════════════════════════════════════════
  # Stage 2: Create GitHub Release
  # ═══════════════════════════════════════════
  create-release:
    needs: [build, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries/

      - name: Flatten binary artifacts
        run: |
          mkdir -p release-assets
          find binaries/ -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec mv {} release-assets/ \;
          cp dist/*.whl dist/*.tar.gz release-assets/ 2>/dev/null || true

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum *.tar.gz *.zip *.whl 2>/dev/null > checksums.txt || true
          cat checksums.txt

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          LAST_TAG=$(git describe --tags --abbrev=0 --exclude="$TAG" 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges "${LAST_TAG}..HEAD" 2>/dev/null || echo "")
          else
            CHANGELOG=$(git log --oneline --no-merges --max-count=20 2>/dev/null || echo "")
          fi

          cat > release_notes.md <<EOF
          ## Capacium v${VERSION}

          ### What's Changed
          \`\`\`
          ${CHANGELOG:-Initial release}
          \`\`\`

          ### Install

          **Homebrew**
          \`\`\`bash
          brew update && brew upgrade capacium
          cap -v  # → ${VERSION}
          \`\`\`

          **pip**
          \`\`\`bash
          pip install capacium==${VERSION}
          \`\`\`

          **Docker**
          \`\`\`bash
          docker pull ghcr.io/capacium/cap:${VERSION}
          \`\`\`

          **Standalone binaries** — attached below for macOS, Linux, and Windows.

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Capacium v${{ github.ref_name }}"
          body_path: release_notes.md
          generate_release_notes: false
          files: release-assets/*

      - name: Verify release title
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          EXPECTED="Capacium ${TAG}"
          ACTUAL=$(gh release view "$TAG" --repo "${{ github.repository }}" --json name --jq '.name' 2>/dev/null || echo "")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Fixing release title: expected '${EXPECTED}', got '${ACTUAL}'"
            gh release edit "$TAG" --repo "${{ github.repository }}" --title "$EXPECTED"
          fi
          echo "Release title: ${EXPECTED}"

  # ═══════════════════════════════════════════
  # Stage 3: Distribute (parallel, independent)
  # ═══════════════════════════════════════════

  publish-pypi:
    needs: create-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/capacium
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/cap
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-homebrew:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Compute tarball SHA256
        id: hash
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -sSL "$URL" -o capacium.tar.gz
          SHA=$(sha256sum capacium.tar.gz | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Capacium/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          FILE="tap/Formula/capacium.rb"
          python3 - <<PY
          import re, pathlib
          p = pathlib.Path("$FILE")
          s = p.read_text()
          s = re.sub(r'url "[^"]+"', 'url "${{ steps.hash.outputs.url }}"', s, count=1)
          s = re.sub(r'sha256 "[a-f0-9]+"', 'sha256 "${{ steps.hash.outputs.sha }}"', s, count=1)
          p.write_text(s)
          PY
          echo "Updated formula:"
          cat "$FILE"

      - name: Commit and push tap update
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/capacium.rb
          if git diff --cached --quiet; then
            echo "No changes — formula already up to date."
            exit 0
          fi
          git commit -m "capacium: update to ${{ steps.hash.outputs.tag }}"
          git push

  update-winget:
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Generate Winget manifest
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Winget manifest update for Capacium v${VERSION}"
          echo ""
          echo "To publish to winget-pkgs, create a PR at:"
          echo "  https://github.com/microsoft/winget-pkgs"
          echo ""
          echo "Manifest path:"
          echo "  manifests/c/Capacium/Capacium/${VERSION}/"
          echo ""
          echo "Run locally with the wingetcreate tool:"
          echo "  wingetcreate update Capacium.Capacium -v ${VERSION} -u https://github.com/Capacium/capacium/releases/download/${TAG}/cap-macOS-ARM64.tar.gz"

      - name: Dispatch Winget manifest PR trigger
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Automated Winget PR creation not yet configured."
          echo "Manual steps for v${VERSION} documented above."
