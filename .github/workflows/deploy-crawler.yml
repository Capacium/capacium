name: Deploy Crawler

on:
  push:
    branches: [main]
    paths:
      - "capacium-crawler/src/**"
      - "capacium-crawler/pyproject.toml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: capacium/capacium-crawler

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: capacium-crawler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest pytest-cov ruff
          pip install -e .
      - name: Lint with ruff
        run: python -m ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: capacium-crawler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest pytest-cov ruff
          pip install -e .
      - name: Test with pytest
        run: python -m pytest tests/ -v --tb=short --cov=src

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: capacium-crawler
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to CX33 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CX33_HOST }}
          username: ${{ secrets.CX33_USERNAME }}
          key: ${{ secrets.CX33_SSH_KEY }}
          script: |
            docker pull ghcr.io/capacium/capacium-crawler:latest
            docker stop capacium-crawler || true
            docker rm capacium-crawler || true
            docker run -d \
              --name capacium-crawler \
              --restart unless-stopped \
              ghcr.io/capacium/capacium-crawler:latest
