name: Purge Cloudflare Cache

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "URLs to purge (comma-separated, empty = entire zone)"
        required: false
        default: "https://dash.capacium.xyz,https://api.capacium.xyz"

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare Cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          URLS: ${{ github.event.inputs.urls }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "⚠ Cloudflare secrets not configured — skipping purge"
            exit 0
          fi

          if [ -n "$URLS" ]; then
            # Purge specific URLs
            FILES=$(echo "$URLS" | tr ',' '\n' | sed 's/^/"/;s/$/"/' | paste -sd ',' -)
            PAYLOAD="{\"files\":[$FILES]}"
          else
            # Purge everything
            PAYLOAD='{"purge_everything":true}'
          fi

          echo "→ Purging: $(echo $URLS | tr '\n' ' ')"
          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success', False))" 2>/dev/null || echo "false")
          if [ "$SUCCESS" = "True" ]; then
            echo "✓ Cache purged successfully"
          else
            echo "✗ Purge failed: $RESPONSE"
            exit 1
          fi
