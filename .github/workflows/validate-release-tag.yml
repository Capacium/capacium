name: Validate Release Tag

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate pyproject.toml version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJ_VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          if [ "$PYPROJ_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: pyproject.toml version is ${PYPROJ_VERSION}, but tag is v${TAG_VERSION}."
            echo "  Bump pyproject.toml to ${TAG_VERSION} before tagging."
            exit 1
          fi
          echo "pyproject.toml version (${PYPROJ_VERSION}) matches tag v${TAG_VERSION}."
      - name: Validate README version references match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "@v${TAG_VERSION}" README.md; then
            echo "ERROR: README.md references are not updated to v${TAG_VERSION}."
            echo "  Run: sed -i 's/@v[0-9.]*/@v${TAG_VERSION}/g' README.md"
            echo "  Run: sed -i 's|ghcr.io/capacium/cap:[0-9.]*|ghcr.io/capacium/cap:${TAG_VERSION}|g' README.md"
            exit 1
          fi
          echo "README version references match v${TAG_VERSION}."
