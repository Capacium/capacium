name: Health Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Exchange API
        id: exchange
        continue-on-error: true
        run: curl -fsS -o /dev/null -w "%{http_code}" https://api.capacium.xyz/v2/stats

      - name: Check Dashboard
        id: dashboard
        continue-on-error: true
        run: curl -fsS -o /dev/null -w "%{http_code}" https://dash.capacium.xyz

      - name: Check Crawler Health
        id: crawler
        continue-on-error: true
        run: |
          STATUS=$(curl -fsS https://api.capacium.xyz/v2/stats | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('crawler_health','unknown'))" 2>/dev/null || echo "unknown")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "healthy" ]; then
            echo "Crawler health: $STATUS"
            exit 1
          fi

      - name: Collect Failures
        id: collect
        if: |
          steps.exchange.outcome == 'failure' ||
          steps.dashboard.outcome == 'failure' ||
          steps.crawler.outcome == 'failure'
        run: |
          FAILURES=""
          [ "${{ steps.exchange.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- Exchange API (https://api.capacium.xyz/v2/stats)"
          [ "${{ steps.dashboard.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- Dashboard (https://dash.capacium.xyz)"
          [ "${{ steps.crawler.outcome }}" = "failure" ] && FAILURES="$FAILURES\n- Crawler health: ${{ steps.crawler.outputs.status }}"
          echo "failures<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FAILURES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Health Alert Issue
        if: |
          steps.exchange.outcome == 'failure' ||
          steps.dashboard.outcome == 'failure' ||
          steps.crawler.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const failures = `${{ steps.collect.outputs.failures }}`;
            const body = `## Health Check Failed

            **Timestamp:** ${new Date().toISOString()}
            **Run:** [${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            ### Failures:${failures}
            `;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-alert',
              state: 'open',
            });
            const existing = issues.data.find(i => i.title === 'Health Check Failed');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Health Check Failed',
                body,
                labels: ['health-alert'],
              });
            }

      - name: Write Tracking Log
        if: always()
        run: |
          DATE=$(date +%Y%m%d)
          LOG_FILE=".skillweave/tracking-log/health-${DATE}.log"
          EXCHANGE="${{ steps.exchange.outcome }}"
          DASHBOARD="${{ steps.dashboard.outcome }}"
          CRAWLER="${{ steps.crawler.outcome }}"
          CRAWLER_STATUS="${{ steps.crawler.outputs.status }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "${TIMESTAMP} | exchange=${EXCHANGE} dashboard=${DASHBOARD} crawler=${CRAWLER} crawler_status=${CRAWLER_STATUS}" >> "$LOG_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$LOG_FILE"
          git diff --staged --quiet || git commit -m "chore: health check log $(date +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main || echo "Push skipped (no changes or permission denied)"
