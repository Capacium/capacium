site_name: Capacium
site_description: Capability infrastructure for the agent ecosystem — packaging, discovery, verification, and trust
site_author: fusionaize.com
site_url: https://docs.capacium.xyz
repo_url: https://github.com/Capacium/capacium
repo_name: Capacium/capacium
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo-white.svg
  favicon: assets/logo-white.svg
  palette:
    - media: "(prefers-color-scheme)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

extra_css:
  - assets/brand-colors.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started.md
  - Vision & Roadmap:
      - v2 Vision: vision.md
  - CLI Reference: cli-reference.md
  - Manifest Spec:
      - capability.yaml: manifest.md
      - Bundles: bundles.md
  - Trust Model:
      - Overview: trust-model.md
      - Signing: signing.md
      - Lock Files: lockfile.md
  - Adapters: adapters.md
  - Runtimes: runtimes.md
  - Registry: registry.md
  - Publishing: publishing.md
  - Marketplace:
      - Marketplace: marketplace.md
      - Monetization: monetization.md
  - Exchange:
      - Exchange Overview: exchange.md
      - API Reference: api-reference.md
      - Crawler: crawler.md
  - Architecture:
      - Overview: architecture.md
      - Document Model v2: document-model.md
      - Repo Topology: repo-topology.md
      - Core Boundary: core-boundary.md
      - Bridge Boundary: bridge-boundary.md
      - Exchange Boundary: exchange-boundary.md
      - Crawler Boundary: crawler-boundary.md
      - Tap Boundary: tap-boundary.md
  - Maintained By: maintained-by.md
  - Contributing:
      - Contributing: https://github.com/Capacium/capacium/blob/main/CONTRIBUTING.md

plugins:
  - search
