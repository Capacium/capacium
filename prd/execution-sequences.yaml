# =============================================================================
# Capacium Phase 2 — Execution Sequences
# Generated: 2026-04-23
# Mode: mixed / ralph_attended
# =============================================================================
metadata:
  sequence_id: "CAP-P2-001"
  title: "Capacium Phase 2 — Consolidation & Extension"
  version: "1.0.0"
  created: "2026-04-23"
  mode: "mixed"
  complexity: "medium"
  domain: "developer-tools"
  intent: >
    Implement Phase 2 of Capacium across 5 parallel workstreams:
    bundle support, framework adapters, lock file, remote registry spec,
    and SkillWeave bundle packaging.
  language: "en"

objective: >
  Extend Capacium from its Phase 1 foundation (single-kind, single-adapter,
  no locking, local-only registry) to a multi-bundle, multi-adapter,
  lock-capable system with a remote registry protocol specification and
  SkillWeave as a published bundle cap.

success_criteria:
  - "Bundle kind: recursive install, removal, list/search filtering, fingerprint all pass tests"
  - "Framework adapters: Claude Code + Gemini CLI adapters translate capabilities correctly"
  - "Adapter auto-selection: manifest frameworks: field drives correct adapter choice"
  - "Lock file: cap lock generates capability.lock; subsequent installs enforce pinned versions"
  - "Remote registry: OpenAPI 3.0 spec exists for registry protocol"
  - "REST client: cap search --registry <url> returns remote results"
  - "SkillWeave bundle: cap install skillweave installs entire SkillWeave system"
  - "All workstream tests pass with >90% core module coverage"

assumptions:
  - "Phase 1 (EXTRACT-001 through EXTRACT-011) is complete and tests pass"
  - "Python 3.10+ is available with stdlib only for core operations"
  - "PyYAML is available for YAML parsing (optional, JSON fallback exists)"
  - "Existing ~/.capacium/ directory structure is intact"
  - "SkillWeave skills are at known paths for bundling"

usage_notes:
  execution_mode: "ralph_attended"
  checkpoint_interval: 3
  human_checkpoints:
    - after: "PHASE-INIT"
      purpose: "Verify workstream foundations before parallel execution"
    - after: "PARALLEL-WORKSTREAMS"
      purpose: "Review all 4 parallel workstream outputs before dependent work"
    - after: "PHASE-INTEGRATION"
      purpose: "Verify integration and full test suite before finalization"
  memory_tracking: "progress-structured.yaml"
  agent_routing: "capability_based"

inputs_required:
  - "Existing Phase 1 codebase at src/capacium/"
  - "Existing PRD at prd/prd.md and prd/prd.json"
  - "Existing adapter base class at src/capacium/adapters/base.py"
  - "Existing models (Capability, Kind enum, Dependency) in src/capacium/models.py"
  - "SkillWeave source files for bundling"
  - "Project capability.yaml manifest examples for testing"

outputs_required:
  - "src/capacium/commands/install.py — bundle-aware recursive install"
  - "src/capacium/commands/remove.py — bundle-aware recursive remove"
  - "src/capacium/commands/list.py — --kind bundle filtering"
  - "src/capacium/commands/search.py — --kind bundle filtering"
  - "src/capacium/commands/lock.py — new lock command"
  - "src/capacium/adapters/claude_code.py — new adapter"
  - "src/capacium/adapters/gemini_cli.py — new adapter"
  - "src/capacium/registry_client.py — REST client module"
  - "specs/registry-openapi.yaml — OpenAPI 3.0 spec"
  - "bundles/skillweave/capability.yaml — SkillWeave bundle manifest"
  - "tests/ — tests for all new functionality"
  - "Updated AGENTS.md with new patterns"

# =============================================================================
# Phase: INIT — Preparation & Foundation Review
# =============================================================================
phases:
  - name: "init-foundation"
    id: "PHASE-INIT"
    description: >
      Review Phase 1 completion status, verify all foundations exist,
      and prepare the development environment for Phase 2 workstreams.
    parallel: false
    tasks:
      - id: "INIT-001"
        title: "Verify Phase 1 completion"
        description: >
          Run full test suite, verify all 7 CLI commands work,
          confirm adapter base class, models, manifest, registry are
          all functional and tested.
        required_capabilities: ["review", "testing"]
        estimated_minutes: 15
        verification:
          - "pytest tests/ passes with no failures"
          - "cap --help shows all commands"
          - "cap list works on a test install"
          - "All EXTRACT tasks marked complete in progress"

      - id: "INIT-002"
        title: "Map Phase 2 changes to existing code"
        description: >
          For each workstream, identify the exact files that need modification
          and the interfaces/contracts they depend on. Document the change plan
          in-memory for each workstream.
        required_capabilities: ["planning"]
        estimated_minutes: 10
        verification:
          - "Change plan documented per workstream"
          - "No conflicting modifications between workstreams identified"

# =============================================================================
# Phase: PARALLEL EXECUTION — Workstreams 1-4 (independent)
# =============================================================================

  # ---------------------------------------------------------------------------
  # Workstream 1: Bundle Support
  # ---------------------------------------------------------------------------
  - name: "ws-bundle-support"
    id: "WS-BUNDLE"
    description: >
      Implement kind: bundle support including recursive sub-capability
      installation, bundle-aware list/search filtering, bundle fingerprinting,
      and bundle removal with sub-cap cleanup.
    parallel: true
    depends_on: ["PHASE-INIT"]
    tasks:

      - id: "BUNDLE-001"
        title: "Extend manifest.py for bundle capabilities section"
        description: >
          Add parsing support for the `capabilities: []` section in
          capability.yaml for kind: bundle. Each entry has: name, source
          (path/URL/git), version (optional). Validate that bundle caps
          either have capabilities or a valid reason for being empty.
          Add manifest validation rules for bundle-specific fields.
        required_capabilities: ["code_generation"]
        estimated_minutes: 30
        files:
          - "src/capacium/manifest.py"
        verification:
          - "Bundle manifest with 3 sub-caps parses correctly"
          - "Bundle manifest without capabilities section raises clear error"
          - "Non-bundle kind with capabilities section raises validation warning"
          - "Relative source paths resolved correctly against bundle directory"

      - id: "BUNDLE-002"
        title: "Recursive bundle installation in install.py"
        description: >
          Extend the install command to detect kind: bundle and recursively
          install all sub-capabilities listed in the capabilities: section.
          Support nested bundles (bundle within bundle). Resolve relative
          and absolute source paths. Install sub-caps into cache before
          creating bundle symlink. Track parent-child relationships in
          registry for clean removal.
        required_capabilities: ["code_generation"]
        estimated_minutes: 45
        files:
          - "src/capacium/commands/install.py"
        verification:
          - "Bundle with 3 sub-caps installs all 3"
          - "Nested bundle installs recursively"
          - "Sub-cap source path resolution works (relative + absolute)"
          - "Registry tracks parent-child relationships"
          - "Duplicate sub-cap across bundles deduplicates in cache"

      - id: "BUNDLE-003"
        title: "Bundle removal with sub-cap cleanup"
        description: >
          Extend the remove command to recursively remove all sub-capabilities
          when a bundle is removed. Sub-caps used by other bundles are preserved
          (reference counting). Support --force flag to remove even with
          external dependents.
        required_capabilities: ["code_generation"]
        estimated_minutes: 25
        files:
          - "src/capacium/commands/remove.py"
          - "src/capacium/registry.py"
        verification:
          - "Bundle removal removes all sub-caps not shared with other bundles"
          - "Shared sub-cap preserved when removing one bundle"
          - "--force removes bundle regardless of dependent warnings"
          - "Non-existent bundle removal produces clear error"

      - id: "BUNDLE-004"
        title: "Bundle filtering in list/search + bundle fingerprint"
        description: >
          Add --kind bundle flag support to list and search commands.
          Implement bundle-level fingerprinting that covers all sub-cap
          fingerprints (fingerprint of fingerprints). Extend verify to
          check bundle integrity by verifying all sub-caps.
        required_capabilities: ["code_generation"]
        estimated_minutes: 30
        files:
          - "src/capacium/commands/list.py"
          - "src/capacium/commands/search.py"
          - "src/capacium/commands/verify.py"
          - "src/capacium/fingerprint.py"
        verification:
          - "cap list --kind bundle shows only bundles"
          - "cap search --kind bundle filters correctly"
          - "Bundle fingerprint = SHA-256 of concatenated sub-cap fingerprints"
          - "cap verify on bundle checks all sub-caps"
          - "Tampered sub-cap detected by bundle verify"

  # ---------------------------------------------------------------------------
  # Workstream 2: Framework Adapters (Claude Code + Gemini CLI)
  # ---------------------------------------------------------------------------
  - name: "ws-framework-adapters"
    id: "WS-ADAPTERS"
    description: >
      Implement framework adapters for Claude Code and Gemini CLI,
      extending the FrameworkAdapter ABC. Implement auto-selection based
      on manifest frameworks: field. Write tests for each adapter.
    parallel: true
    depends_on: ["PHASE-INIT"]
    tasks:

      - id: "ADAPTER-001"
        title: "Claude Code framework adapter"
        description: >
          Create adapters/claude_code.py extending FrameworkAdapter.
          Translate a Capability into Claude Code's format (skills dir
          at ~/.claude/skills/ or equivalent). Support capability install,
          remove, and list operations. Handle Claude Code's configuration
          format for skill registration.
        required_capabilities: ["code_generation"]
        estimated_minutes: 35
        files:
          - "src/capacium/adapters/claude_code.py"
          - "src/capacium/adapters/__init__.py"
        verification:
          - "ClaudeCodeAdapter extends FrameworkAdapter and implements all abstract methods"
          - "install creates correct structure in Claude Code skills directory"
          - "remove cleans up Claude Code integration"
          - "Error handling for missing Claude Code directory"

      - id: "ADAPTER-002"
        title: "Gemini CLI framework adapter"
        description: >
          Create adapters/gemini_cli.py extending FrameworkAdapter.
          Translate a Capability into Gemini CLI's format. Support
          install, remove, and list operations. Handle Gemini CLI's
          configuration format for capability registration.
        required_capabilities: ["code_generation"]
        estimated_minutes: 35
        files:
          - "src/capacium/adapters/gemini_cli.py"
          - "src/capacium/adapters/__init__.py"
        verification:
          - "GeminiCLIAdapter extends FrameworkAdapter and implements all methods"
          - "install creates correct structure for Gemini CLI"
          - "remove cleans up Gemini CLI integration"
          - "Error handling for missing Gemini CLI configuration"

      - id: "ADAPTER-003"
        title: "Adapter auto-selection logic + tests"
        description: >
          Implement adapter auto-selection in the install command flow.
          When a capability has a frameworks: field in manifest, select
          the matching adapter. If no framework specified, use default
          (opencode). Add adapter registry/discovery pattern. Write
          comprehensive tests for both new adapters.
        required_capabilities: ["code_generation", "testing"]
        estimated_minutes: 30
        files:
          - "src/capacium/commands/install.py"
          - "src/capacium/adapters/__init__.py"
          - "tests/test_adapters.py"
        verification:
          - "Adapter auto-selection picks correct adapter per frameworks field"
          - "Unsupported framework produces clear error"
          - "Empty frameworks field defaults to opencode"
          - "Adapter tests cover install, remove, list for both new adapters"
          - "Adapter registry pattern documented in adapters/__init__.py"

  # ---------------------------------------------------------------------------
  # Workstream 3: Lock File
  # ---------------------------------------------------------------------------
  - name: "ws-lock-file"
    id: "WS-LOCK"
    description: >
      Implement capability.lock generation and enforcement for reproducible
      installations. Lock file pins all dependency versions with fingerprints.
      Enforce lock file on subsequent install operations.
    parallel: true
    depends_on: ["PHASE-INIT"]
    tasks:

      - id: "LOCK-001"
        title: "Design lock file format and data model"
        description: >
          Define the capability.lock YAML format. Each entry includes:
          capability name, pinned version, SHA-256 fingerprint, source URL/path,
          dependency list with pinned versions. Define the LockFile data class
          in models.py. Lock file sits alongside capability.yaml or in the
          capability root directory.
        required_capabilities: ["planning", "code_generation"]
        estimated_minutes: 20
        files:
          - "src/capacium/models.py"
        verification:
          - "LockFile dataclass defined with all required fields"
          - "capability.lock format documented"
          - "Lock file schema validates correctly"
          - "Round-trip: serialize to YAML → deserialize → match original"

      - id: "LOCK-002"
        title: "Implement cap lock command"
        description: >
          Create commands/lock.py with `cap lock` command. Lock scans the
          installed capability tree, resolves all dependency versions, and
          writes capability.lock with pinned versions and fingerprints.
          Support `cap lock --update` to refresh an existing lock file.
          Integrate lock generation into install flow (lock on install).
        required_capabilities: ["code_generation"]
        estimated_minutes: 35
        files:
          - "src/capacium/commands/lock.py"
          - "src/capacium/cli.py"
        verification:
          - "cap lock generates capability.lock with all dependencies"
          - "cap lock --update refreshes existing lock"
          - "cap install automatically generates/updates lock"
          - "Lock file contains pinned versions + fingerprints for all deps"

      - id: "LOCK-003"
        title: "Lock file enforcement on install"
        description: >
          When a capability.lock exists, enforce it during install:
          version must match pinned version exactly, fingerprint must match,
          transitive dependencies must match locked versions. Block install
          with clear message on mismatch. Support `cap install --no-lock`
          to bypass enforcement.
        required_capabilities: ["code_generation"]
        estimated_minutes: 30
        files:
          - "src/capacium/commands/install.py"
        verification:
          - "Install with matching lock proceeds normally"
          - "Install with version mismatch blocks with error"
          - "Install with fingerprint mismatch blocks with error"
          - "cap install --no-lock bypasses lock enforcement"
          - "Lock enforcement detects transitive dep changes"

  # ---------------------------------------------------------------------------
  # Workstream 4: Remote Registry
  # ---------------------------------------------------------------------------
  - name: "ws-remote-registry"
    id: "WS-REGISTRY"
    description: >
      Define the OpenAPI 3.0 specification for the remote registry protocol
      and implement a REST client in the CLI. Add cap search --registry <url>
      support and cap publish command stub.
    parallel: true
    depends_on: ["PHASE-INIT"]
    tasks:

      - id: "REGISTRY-001"
        title: "OpenAPI 3.0 spec for remote registry protocol"
        description: >
          Create specs/registry-openapi.yaml defining the REST API for
          capability registry operations. Endpoints:
          GET /capabilities — list/search capabilities
          GET /capabilities/{name} — get capability details
          GET /capabilities/{name}/versions — list versions
          GET /capabilities/{name}/download — download capability archive
          POST /capabilities — publish capability (Phase 2 stub, full in Phase 3)
          Include schemas for CapabilityResponse, VersionResponse, ErrorResponse.
          Use OpenAPI 3.0 with bearer token auth.
        required_capabilities: ["planning", "infrastructure"]
        estimated_minutes: 45
        files:
          - "specs/registry-openapi.yaml"
        verification:
          - "OpenAPI spec validates against OpenAPI 3.0 schema"
          - "All endpoints defined with request/response schemas"
          - "Authentication via bearer token specified"
          - "Error responses defined for 400, 401, 404, 500"

      - id: "REGISTRY-002"
        title: "REST client for remote registry"
        description: >
          Create src/capacium/registry_client.py with a REST client class.
          Use urllib.request (stdlib) — no external HTTP deps. Methods:
          search(query, kind, registry_url), get_capability(name, registry_url),
          list_versions(name, registry_url). Handle HTTP errors, JSON parsing,
          timeout, and network errors gracefully. Support HTTPS with cert verification.
        required_capabilities: ["code_generation"]
        estimated_minutes: 40
        files:
          - "src/capacium/registry_client.py"
        verification:
          - "RegistryClient.search() returns parsed results"
          - "RegistryClient.get_capability() returns capability metadata"
          - "HTTP 404 produces CapabilityNotFoundError"
          - "Network timeout produces readable error"
          - "JSON parsing errors handled gracefully"

      - id: "REGISTRY-003"
        title: "cap search --registry + cap publish stub"
        description: >
          Extend the search command to support --registry <url> flag for
          remote registry queries. Implement cap publish as a command stub
          that validates the capability and prints 'PUBLISH NOT IMPLEMENTED'
          with the payload it would send. Add proper CLI integration for both.
        required_capabilities: ["code_generation"]
        estimated_minutes: 25
        files:
          - "src/capacium/commands/search.py"
          - "src/capacium/commands/publish.py"
          - "src/capacium/cli.py"
        verification:
          - "cap search query --registry https://registry.example.com returns remote results"
          - "cap search without --registry uses local registry (backward compat)"
          - "cap publish <path> validates manifest and prints publish info"
          - "cap publish shows in cap --help output"
          - "CLI integration consistent with Phase 1 patterns"

# =============================================================================
# Phase: PHASE-INTEGRATION — Dependent Workstream + Integration
# =============================================================================

  - name: "integration"
    id: "PHASE-INTEGRATION"
    description: >
      Merge the 4 parallel workstream outputs, implement SkillWeave
      bundle (depends on WS-BUNDLE), run full integration tests,
      update documentation.
    parallel: false
    depends_on: ["WS-BUNDLE", "WS-ADAPTERS", "WS-LOCK", "WS-REGISTRY"]
    tasks:

      # -----------------------------------------------------------------------
      # Workstream 5: SkillWeave Bundle (depends on WS-BUNDLE)
      # -----------------------------------------------------------------------
      - id: "SWBUNDLE-001"
        title: "Create SkillWeave bundle structure"
        description: >
          Create bundles/skillweave/ directory with a capability.yaml
          manifest of kind: bundle. List all SkillWeave skills as sub-capabilities
          in the capabilities: section. Each skill entry: name, source path
          relative to bundle. Include the SkillWeave system README and entry
          point info in the bundle metadata.
        required_capabilities: ["code_generation", "infrastructure"]
        estimated_minutes: 25
        files:
          - "bundles/skillweave/capability.yaml"
        verification:
          - "bundles/skillweave/capability.yaml exists with kind: bundle"
          - "capabilities section lists all SkillWeave skills"
          - "Bundle metadata includes SkillWeave description, author, version"
          - "Source paths resolve correctly relative to bundle directory"

      - id: "SWBUNDLE-002"
        title: "Verify SkillWeave bundle install end-to-end"
        description: >
          Run cap install on bundles/skillweave/. Verify all sub-capabilities
          are installed, cap list shows the bundle and its sub-caps,
          bundle fingerprint matches, removal cleans up everything.
          Write integration tests for the bundle workflow.
        required_capabilities: ["testing"]
        estimated_minutes: 25
        files:
          - "tests/test_bundle_skillweave.py"
        verification:
          - "cap install bundles/skillweave/ installs successfully"
          - "cap list shows SkillWeave bundle and all sub-caps"
          - "cap verify skillweave returns VERIFIED"
          - "cap remove skillweave removes all sub-caps"
          - "Integration test passes for full workflow"

      # -----------------------------------------------------------------------
      # Cross-workstream validation
      # -----------------------------------------------------------------------
      - id: "INTEG-001"
        title: "Cross-workstream integration tests"
        description: >
          Write integration tests that exercise multiple workstreams together:
          (1) install bundle with framework adapters, (2) lock a bundle install,
          (3) verify bundle with lock enforcement, (4) search registry with
          kind filtering. Ensure no regressions in Phase 1 commands.
        required_capabilities: ["testing"]
        estimated_minutes: 35
        files:
          - "tests/test_integration_phase2.py"
        verification:
          - "Bundle install + framework adapter selects correct adapter"
          - "cap lock on bundle install generates correct lock file"
          - "cap verify with lock enforcement detects mismatches"
          - "Removal cascades correctly across bundles"
          - "Phase 1 tests still pass (no regressions)"
          - "Full test suite passes with >90% coverage"

      - id: "INTEG-002"
        title: "Update documentation and AGENTS.md"
        description: >
          Update AGENTS.md with new Phase 2 conventions:
          bundle command patterns, lock file workflow, adapter registration,
          remote registry usage. Update prd/prd.md completion status.
          Add Phase 2 patterns to progress tracking.
        required_capabilities: ["documentation"]
        estimated_minutes: 15
        files:
          - "AGENTS.md"
          - "prd/progress.md"
        verification:
          - "AGENTS.md updated with new Phase 2 patterns"
          - "Bundle, lock, adapter, registry usage documented"
          - "Progress tracking updated"

# =============================================================================
# Final Assembly
# =============================================================================
final_assembly: >
  After all 4 parallel workstreams (WS-BUNDLE, WS-ADAPTERS, WS-LOCK, WS-REGISTRY)
  and the integration phase (PHASE-INTEGRATION) complete:

  1. Run the full test suite and confirm all tests pass
  2. Run coverage report and confirm >90% on core modules
  3. Run linting/type checking on all new files
  4. Verify cap --help shows all Phase 1 + Phase 2 commands
  5. Verify end-to-end: cap install skillweave (bundle) → cap list → cap verify → cap remove
  6. Verify lock workflow: cap install → cap lock → modify dep → cap install (blocked) → cap install --no-lock
  7. Verify remote search: cap search query --registry <test-url>
  8. Update prd/prd.json with Phase 2 task completion
  9. Update progress tracking

  Final output: fully functional Phase 2 Capacium CLI with all 5 workstreams
  implemented, tested, and documented.

# =============================================================================
# Validation Rules
# =============================================================================
validation_rules:
  - "Every new command or subcommand must appear in cap --help output"
  - "Every new module must have corresponding tests"
  - "No external dependencies added beyond stdlib + optional PyYAML"
  - "All exit codes follow convention: 0=success, 1=user error, 2=system error"
  - "Bundle fingerprint must change if ANY sub-cap fingerprint changes"
  - "Lock file must be valid YAML and pass schema validation"
  - "Adapter ABC must remain backward compatible with existing OpenCode adapter"
  - "Remote search must fail gracefully with clear error if registry unreachable"
  - "cap publish stub must not modify any filesystem state"
  - "All new tests must pass before integration verification"

# =============================================================================
# Failure Handling
# =============================================================================
failure_handling: >
  Per-workstream failures are isolated to that workstream. If a workstream
  fails during parallel execution, the other workstreams continue. At the
  PHASE-INTEGRATION checkpoint, failed workstreams are reviewed:

  - Minor failure (test edge case, formatting): Fix and retry within workstream
  - Major failure (design flaw, missing interface): Raise at human checkpoint
    for architectural decision. Workstream may be descoped with agreement.

  If multiple workstreams fail, prioritize WS-BUNDLE and WS-ADAPTERS as they
  have downstream dependents (SWBUNDLE depends on WS-BUNDLE).

  Resource exhaustion: If parallel execution exceeds available context/token
  budget, reduce parallelism by running workstreams sequentially:
  Priority order: WS-BUNDLE > WS-ADAPTERS > WS-LOCK > WS-REGISTRY

# =============================================================================
# Final Deliverable Format
# =============================================================================
final_deliverable_format: |
  The final deliverable is a Phase 2 enhanced Capacium CLI at src/capacium/
  with all modifications integrated and tested. Deliverable checklist:

  Files Added:
  - src/capacium/adapters/claude_code.py
  - src/capacium/adapters/gemini_cli.py
  - src/capacium/commands/lock.py
  - src/capacium/commands/publish.py
  - src/capacium/registry_client.py
  - specs/registry-openapi.yaml
  - bundles/skillweave/capability.yaml
  - tests/test_adapters.py
  - tests/test_bundle_skillweave.py
  - tests/test_integration_phase2.py

  Files Modified:
  - src/capacium/manifest.py (bundle capabilities section)
  - src/capacium/models.py (LockFile data class)
  - src/capacium/commands/install.py (bundle install + lock enforcement)
  - src/capacium/commands/remove.py (bundle recursive remove)
  - src/capacium/commands/list.py (--kind bundle filtering)
  - src/capacium/commands/search.py (--kind bundle + --registry)
  - src/capacium/commands/verify.py (bundle fingerprint)
  - src/capacium/fingerprint.py (composite bundle fingerprint)
  - src/capacium/adapters/__init__.py (adapter registry)
  - src/capacium/cli.py (lock + publish commands)
  - AGENTS.md

  Verification: pytest tests/ --cov=capacium (all pass, >90% coverage)
  Integration: cap install skillweave --framework opencode (end-to-end)
