## Failure Handling

| Failure | Recovery |
|---------|----------|
| Existing tests break after Kind change | Revert ARCH-001, check Kind string comparison in tests |
| SQLite migration fails on existing DB | Check for column name conflicts, test with fresh DB |
| GitHub API rate limit during crawl test | Use mock responses, add backoff in source |
| Search performance degradation | Add FTS5 virtual table, optimize index usage |
| Trust transition edge case | Add missing transition to TrustState machine, add test |

