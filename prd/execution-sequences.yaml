## Objective

Execute the Capacium Core V2 development program: extend the existing v0.4.1 codebase with MCP-Server support, Exchange Core (Listing, Taxonomy, Trust, Search, Publisher), and Crawler subsystem. All work confined to the `src/capacium/` source tree, `tests/`, `docs/`, and `specs/` directories. No external dependencies added to core.

---

## Success Criteria (Binary)

| ID | Criterion |
|----|-----------|
| SC-1 | `Kind.MCP_SERVER` exists and is accepted in manifests and registry |
| SC-2 | `TrustState` enum with 5 states enforces valid transitions |
| SC-3 | Listings table stores ≥1 listing with full metadata |
| SC-4 | Faceted search returns correct results for ≥5 simultaneous filters |
| SC-5 | Crawler GitHub source produces normalized findings from mock API |
| SC-6 | Deduplicator detects URL aliases as duplicates |
| SC-7 | Claim/verify flow transitions listing through trust states |
| SC-8 | `cap search --type mcp-server` returns only MCP listings |
| SC-9 | `cap info <name>` outputs full listing with MCP metadata |
| SC-10 | All 213 existing tests continue to pass |
| SC-11 | ≥90% test coverage on new modules |
| SC-12 | OpenAPI spec validates without errors |

