### Phase 1: Foundation (Parallel Lane A + B)

**Purpose:** Core models, enums, and database schema — everything else depends on these.

```yaml
phase: "foundation"
parallel: true
checkpoint: true

lane_a:
  - id: "ARCH-001"
    task: "Extend Kind enum with MCP_SERVER"
    file: "src/capacium/models.py"
    depends_on: []
    capabilities: ["code_generation"]
    verification:
      - "Kind.MCP_SERVER.value == 'mcp-server'"
      - "Existing Kind values unchanged"
      - "213 existing tests pass"

  - id: "ARCH-002"
